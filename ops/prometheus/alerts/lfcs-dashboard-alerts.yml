groups:
  - name: lfcs-dashboard.slo-alerts
    rules:
      - alert: LFCSDashboardDown
        expr: up{job="lfcs-dashboard"} == 0
        for: 2m
        labels:
          severity: critical
          service: lfcs-dashboard
          slo: availability
        annotations:
          summary: "LFCS Dashboard is down"
          description: "Prometheus cannot scrape the LFCS Dashboard /metrics endpoint for 2 minutes."
          runbook_url: "docs/runbooks/lfcs-dashboard-alerts.md#lfcsdashboarddown"

      - alert: LFCSDashboardHighErrorRatio
        expr: |
          (
            sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",status_code=~"5..",route!="/metrics"}[5m]))
            /
            clamp_min(sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",route!="/metrics"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: lfcs-dashboard
          slo: availability
        annotations:
          summary: "LFCS Dashboard has elevated 5xx error ratio"
          description: "More than 5% of non-/metrics HTTP requests are returning 5xx responses for 5 minutes."
          runbook_url: "docs/runbooks/lfcs-dashboard-alerts.md#lfcsdashboardhigherrorratio"

      - alert: LFCSDashboardHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(lfcs_dashboard_http_request_duration_seconds_bucket{job="lfcs-dashboard",route!="/metrics"}[5m])
            )
          ) > 0.3
        for: 10m
        labels:
          severity: warning
          service: lfcs-dashboard
          slo: latency
        annotations:
          summary: "LFCS Dashboard p95 latency is high"
          description: "p95 request latency for non-/metrics requests is above 300ms for 10 minutes."
          runbook_url: "docs/runbooks/lfcs-dashboard-alerts.md#lfcsdashboardhighlatencyp95"

      - alert: LFCSDashboardAvailabilityFastBurn
        expr: |
          (
            sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",status_code=~"5..",route!="/metrics"}[5m]))
            /
            clamp_min(sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",route!="/metrics"}[5m])), 0.001)
          ) > 0.14
        for: 5m
        labels:
          severity: critical
          service: lfcs-dashboard
          slo: availability
          burn_rate: fast
        annotations:
          summary: "LFCS Dashboard availability SLO is burning fast"
          description: "5xx error ratio is above 14% over 5 minutes, which would burn a 99% availability error budget very quickly."
          runbook_url: "docs/runbooks/lfcs-dashboard-alerts.md#lfcsdashboardavailabilityfastburn"

      - alert: LFCSDashboardAvailabilitySlowBurn
        expr: |
          (
            sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",status_code=~"5..",route!="/metrics"}[30m]))
            /
            clamp_min(sum(rate(lfcs_dashboard_http_requests_total{job="lfcs-dashboard",route!="/metrics"}[30m])), 0.001)
          ) > 0.02
        for: 30m
        labels:
          severity: warning
          service: lfcs-dashboard
          slo: availability
          burn_rate: slow
        annotations:
          summary: "LFCS Dashboard availability SLO is burning slowly"
          description: "5xx error ratio is above 2% over 30 minutes, suggesting sustained reliability degradation."
          runbook_url: "docs/runbooks/lfcs-dashboard-alerts.md#lfcsdashboardavailabilityslowburn"
