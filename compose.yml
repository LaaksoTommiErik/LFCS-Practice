services:
  lfcs-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: lfcs-dashboard:local
    container_name: lfcs-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: dev-only-change-me-before-real-deployment
    volumes:
      - lfcs-dashboard-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: lfcs-prometheus
    restart: unless-stopped
    depends_on:
      lfcs-dashboard:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: lfcs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  lfcs-dashboard-data:
  prometheus-data:
  grafana-data:
