name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Build, smoke test, and Docker verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lfcs_dashboard_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lfcs_dashboard_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PORT: 3000
      SESSION_SECRET: ci-only-session-secret-not-for-production-0123456789
      ADMIN_EMAIL: ci-admin@example.com
      ADMIN_INITIAL_PASSWORD: ci-only-password-not-for-production
      HOST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/lfcs_dashboard_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build production frontend
        run: npm run build

      - name: Start app and run local smoke test
        shell: bash
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ env.HOST_DATABASE_URL }}
        run: |
          set -euo pipefail

          mkdir -p data

          node server.js > /tmp/lfcs-dashboard-ci.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
            wait "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/healthz | grep -q "healthy"; then
              echo "Application became healthy."
              break
            fi

            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Application process exited early."
              cat /tmp/lfcs-dashboard-ci.log
              exit 1
            fi

            echo "Waiting for application to become healthy..."
            sleep 2
          done

          curl -fsS http://127.0.0.1:3000/healthz | grep -q "healthy"
          curl -fsS http://127.0.0.1:3000/readyz | grep -q "ready"
          curl -fsS http://127.0.0.1:3000/metrics | grep -q "lfcs_dashboard_http_requests_total"

          BASE_URL=http://127.0.0.1:3000 npm run smoke:local


      - name: Ensure local app process is stopped before Compose
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "node server.js" || true
          pkill -f "lfcs-dashboard-ci.log" || true
          sleep 2

      - name: Build Docker image
        run: docker build -t lfcs-dashboard-ci:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: lfcs-dashboard-ci:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Verify Docker Compose stack endpoints
        shell: bash
        run: |
          set -euo pipefail

          DATABASE_URL=postgresql://lfcs:lfcs@postgres:5432/lfcs_dashboard \
          LFCS_DASHBOARD_PORT=3001 docker compose up -d --build

          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3001/healthz | grep -q "healthy" && \
               curl -fsS http://127.0.0.1:3001/readyz | grep -q "ready"; then
              echo "Compose app became healthy and ready."
              break
            fi
            echo "Waiting for compose services to become ready..."
            sleep 3
          done

          curl -fsS http://127.0.0.1:3001/healthz | grep -q "healthy"
          curl -fsS http://127.0.0.1:3001/readyz | grep -q "ready"
          curl -fsS http://127.0.0.1:3001/metrics | grep -q "lfcs_dashboard_http_requests_total"

      - name: Show Docker Compose logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Clean up Docker Compose
        if: always()
        run: docker compose down -v || true
