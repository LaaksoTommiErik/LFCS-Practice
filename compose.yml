services:
  postgres:
    image: postgres:16-alpine
    container_name: lfcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lfcs_dashboard
      POSTGRES_USER: lfcs
      POSTGRES_PASSWORD: lfcs
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfcs -d lfcs_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  lfcs-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: lfcs-dashboard:local
    container_name: lfcs-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LFCS_DASHBOARD_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://lfcs:lfcs@postgres:5432/lfcs_dashboard}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me-before-real-deployment}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  blackbox:
    image: quay.io/prometheus/blackbox-exporter:v0.27.0
    container_name: lfcs-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./ops/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: lfcs-prometheus
    restart: unless-stopped
    depends_on:
      lfcs-dashboard:
        condition: service_healthy
      blackbox:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: lfcs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

  k6:
    image: grafana/k6:latest
    profiles:
      - test
    depends_on:
      lfcs-dashboard:
        condition: service_healthy
    environment:
      BASE_URL: http://lfcs-dashboard:3000
    volumes:
      - ./ops/k6:/scripts:ro
    entrypoint:
      - k6

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
